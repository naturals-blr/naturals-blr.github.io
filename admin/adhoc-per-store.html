<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Post (Store Images) — Naturals Admin</title>
  <script src="/admin/config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #activity-log > div:first-child { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .drop-zone { border: 2px dashed #d1d5db; transition: all 0.2s; }
    .drop-zone.drag-over { border-color: #7C3AED; background: #f3f0ff; }
    .preview-card { border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 0.75rem; transition: background 0.15s; }
    .preview-card:hover { background: #f9fafb; }
    .store-image-zone { border: 1.5px dashed #d1d5db; border-radius: 0.5rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; min-height: 56px; }
    .store-image-zone:hover { border-color: #7C3AED; background: #f3f0ff; }
    .store-image-zone.has-image { border-color: #16a34a; background: #f0fdf4; }
    .result-cell { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
    .badge-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
<div id="auth-container"></div>
  <div class="bg-amber-50 border-b border-amber-200 px-5 py-2 text-xs text-amber-800 flex items-center gap-2 shrink-0">
    <span>&#x26A1;</span>
    <span>This page requires the local console. Run <code class="bg-amber-100 px-1.5 rounded font-mono">npm start</code> and access at <code class="bg-amber-100 px-1.5 rounded font-mono">http://localhost:3456/admin/adhoc-per-store.html</code></span>
  </div>
  <div class="flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-5 py-3 shrink-0">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <a href="./" class="text-lg hover:opacity-70">&larr;</a>
          <h1 class="text-lg font-bold text-purple-800 tracking-tight">&#x1F4E3; Quick Post (Store Images)</h1>
          <div id="status-badges" class="flex items-center gap-2"></div>
        </div>
        <button onclick="location.href='/'" class="text-xs px-3 py-1.5 border border-gray-300 rounded hover:bg-gray-50 text-gray-600">Home</button>
      </div>
    </header>

    <!-- Form -->
    <div class="flex-1 overflow-y-auto p-5">
      <div class="max-w-3xl mx-auto space-y-5">

        <!-- Title + AI generate -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Title *</label>
          <div class="flex gap-2">
            <input type="text" id="post-title" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500" placeholder="e.g. Weekend Special: 20% Off">
            <button id="btn-generate-ai" class="px-3 py-2 text-xs font-medium border border-purple-300 text-purple-700 rounded-lg hover:bg-purple-50 disabled:opacity-40 whitespace-nowrap transition-colors" title="Generate body from title using AI">&zigrarr; Generate</button>
          </div>
        </div>

        <!-- Body + char count -->
        <div>
          <div class="flex items-center justify-between mb-1">
            <label class="block text-sm font-semibold text-gray-700">Body *</label>
            <span id="char-count" class="text-xs text-gray-400 font-mono">0 chars</span>
          </div>
          <textarea id="post-body" rows="4" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500" placeholder="Describe the offer or announcement..."></textarea>
          <div id="platform-limits" class="flex gap-3 mt-1 text-xs text-gray-400"></div>
        </div>

        <!-- Dates -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Start Date</label>
            <input type="date" id="post-start" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">End Date</label>
            <input type="date" id="post-end" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
          </div>
        </div>

        <!-- Platforms -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Platforms</label>
          <div class="flex items-center gap-5 flex-wrap">
            <label class="flex items-center gap-1.5 text-sm cursor-pointer">
              <input type="checkbox" id="platform-fb" checked class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
              <span>Facebook</span>
            </label>
            <label class="flex items-center gap-1.5 text-sm cursor-pointer">
              <input type="checkbox" id="platform-ig" checked class="rounded border-gray-300 text-pink-600 focus:ring-pink-500">
              <span>Instagram</span>
            </label>
            <label class="flex items-center gap-1.5 text-sm cursor-pointer">
              <input type="checkbox" id="platform-gp" checked class="rounded border-gray-300 text-red-600 focus:ring-red-500">
              <span>Google</span>
            </label>
            <span class="text-gray-300 select-none">|</span>
            <label class="flex items-center gap-1.5 text-xs text-gray-600 cursor-pointer select-none">
              <input type="checkbox" id="chk-post-website" class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
              <span>Website</span>
            </label>
            <label class="flex items-center gap-1 text-xs text-gray-600">
              <span class="font-medium">Type:</span>
              <select id="content-type" class="text-xs border border-gray-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-purple-500" onchange="updateGooglePostType()">
                <option value="offer">Offer</option>
                <option value="festival">Festival</option>
                <option value="greeting">Greeting</option>
                <option value="update">Update</option>
                <option value="announcement">Announcement</option>
                <option value="testimonial">Testimonial</option>
              </select>
            </label>
            <label class="flex items-center gap-1 text-xs text-gray-600">
              <span class="font-medium">Google:</span>
              <select id="google-post-type" class="text-xs border border-gray-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
                <option value="OFFER">Offer Post</option>
                <option value="STANDARD">Update Post</option>
                <option value="EVENT">Event Post</option>
              </select>
            </label>
          </div>
        </div>

        <!-- Stores with per-store image upload -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-sm font-semibold text-gray-700">Stores <span class="text-xs font-normal text-gray-400">(upload an image for each store)</span></label>
            <div class="flex gap-2">
              <button id="btn-select-all-stores" class="text-xs px-2 py-1 border border-gray-300 rounded hover:bg-gray-50">Select All</button>
              <button id="btn-deselect-all-stores" class="text-xs px-2 py-1 border border-gray-300 rounded hover:bg-gray-50">None</button>
            </div>
          </div>

          <div id="stores-container" class="space-y-2"></div>
          <p id="no-store-images-msg" class="hidden text-xs text-red-500 mt-1">Upload an image for at least one selected store before publishing.</p>
        </div>

        <!-- Live per-store preview -->
        <div id="live-preview-section" class="hidden">
          <hr class="border-gray-200">
          <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">&#x1F50D; Live Preview</p>
          <div id="store-previews" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </div>

        <!-- Publish button -->
        <div class="pt-2 flex gap-3 items-center flex-wrap">
          <button id="btn-publish" class="px-6 py-2.5 bg-purple-600 text-white text-sm font-semibold rounded-lg hover:bg-purple-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">&#x1F4E4; Publish Now</button>
          <span id="publish-status" class="text-sm text-gray-500 ml-1"></span>
        </div>

        <!-- Result table (appears after publish) -->
        <div id="result-section" class="hidden">
          <hr class="border-gray-200">
          <div class="flex items-center justify-between mb-2">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">&#x1F4CB; Results</p>
            <span id="result-summary" class="text-xs font-medium"></span>
          </div>
          <div id="result-table" class="overflow-x-auto"></div>
          <div class="flex gap-2 mt-2">
            <button id="btn-retry-all" class="hidden text-xs px-3 py-1.5 bg-yellow-500 text-white rounded hover:bg-yellow-600 font-medium transition-colors">Retry All Failed</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Activity log -->
    <div class="bg-white border-t border-gray-200 px-5 py-2 shrink-0">
      <div class="flex items-center justify-between">
        <span class="text-xs font-semibold text-gray-500 uppercase">Activity</span>
        <button onclick="document.getElementById('activity-log').innerHTML = ''" class="text-xs text-gray-400 hover:text-gray-600">Clear</button>
      </div>
      <div id="activity-log" class="font-mono text-xs space-y-0.5 max-h-24 overflow-y-auto"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script>
    const $ = id => document.getElementById(id);

    function log(msg, level) {
      const el = document.getElementById('activity-log');
      const d = new Date();
      const ts = d.toLocaleTimeString('en-IN', { hour12: false });
      const color = level === 'error' ? 'text-red-600' : level === 'success' ? 'text-green-600' : 'text-gray-700';
      el.innerHTML = `<div class="${color}">${ts} ${msg}</div>` + el.innerHTML;
    }

    const STORE_NAMES = { N78: 'JP Nagar 5th Phase', N45: 'Nagavara', N36: 'Ayyappa Nagar', N05: 'Frazer Town', N43: 'Hennur' };
    const STORE_ORDER = ['N78', 'N45', 'N36', 'N05', 'N43'];

    // Auto-set Google Post Type based on Campaign Type
    function updateGooglePostType() {
      const ct = $('content-type')?.value || 'offer';
      const gpDefault = { offer: 'OFFER', festival: 'OFFER', greeting: 'STANDARD', update: 'STANDARD', announcement: 'STANDARD', testimonial: 'STANDARD' };
      $('google-post-type').value = gpDefault[ct] || 'STANDARD';
    }
    document.addEventListener('DOMContentLoaded', updateGooglePostType);
    const LIMITS = { facebook: 63206, instagram: 2200, google: 1500 };
    const IMAGE_DATA = {};

    function getStoreSlug(name) {
      const s = name.toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, '');
      if (s.includes('jpnagar') || (s.includes('jp') && s.includes('nagar'))) return 'jpnagar5thphase';
      if (s.includes('nagavara') || s.includes('elements')) return 'nagavara';
      if (s.includes('ayyappanagar')) return 'ayyappanagar';
      if (s.includes('frazer')) return 'frazertown';
      if (s.includes('hennur')) return 'hennur';
      return s;
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Status badges ──────────────────────────────────────────────
    getStatus().then(s => {
      const badges = document.getElementById('status-badges');
      badges.innerHTML = s.dryRun
        ? '<span class="text-xs px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800 font-medium">&#x1F534; DRY RUN</span>'
        : '<span class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-800 font-medium">&#x1F7E2; LIVE</span>';
    });

    // ── Default dates ──────────────────────────────────────────────
    const today = new Date();
    const todayStr = today.toISOString().slice(0, 10);
    const weekLater = new Date(today);
    weekLater.setDate(weekLater.getDate() + 7);
    if (!$('post-start').value) $('post-start').value = todayStr;
    if (!$('post-end').value) $('post-end').value = weekLater.toISOString().slice(0, 10);

    // ── Render store rows with per-store image upload ──────────────
    function renderStores() {
      const container = $('stores-container');
      container.innerHTML = STORE_ORDER.map(sid => {
        const name = STORE_NAMES[sid] || sid;
        const imgData = IMAGE_DATA[sid] || {};
        const hasImage = !!imgData.imageUrl;
        return `<div class="flex items-center gap-3 p-2 rounded-lg border border-gray-200 bg-white store-row" data-store="${sid}">
          <label class="flex items-center gap-1.5 text-sm cursor-pointer shrink-0 min-w-[140px]">
            <input type="checkbox" class="store-cb rounded border-gray-300 text-purple-600 focus:ring-purple-500" data-store="${sid}" checked>
            <span class="font-medium">${sid}</span>
            <span class="text-xs text-gray-400 truncate">${name}</span>
          </label>
          <div class="flex-1 store-image-zone ${hasImage ? 'has-image' : ''}" data-store="${sid}" title="${hasImage ? 'Change image' : 'Upload image'}">
            <span class="text-xs ${hasImage ? 'text-green-700' : 'text-gray-400'}">
              ${hasImage ? '&#x2705; ' + escHtml(imgData.filename || 'image uploaded') : '&#x1F4C2; Click to upload'}
            </span>
          </div>
          ${hasImage ? `<button class="store-image-remove text-xs px-2 py-1 text-red-500 hover:text-red-700 hover:bg-red-50 rounded" data-store="${sid}" title="Remove image">&times;</button>` : ''}
          <input type="file" class="store-file-input hidden" data-store="${sid}" accept="image/png,image/jpeg,image/webp,image/gif,video/mp4,video/quicktime">
        </div>`;
      }).join('');

      // Bind image zone click
      document.querySelectorAll('.store-image-zone').forEach(zone => {
        zone.addEventListener('click', () => {
          const sid = zone.dataset.store;
          const row = zone.closest('.store-row');
          row.querySelector('.store-file-input').click();
        });
      });

      // Bind remove button
      document.querySelectorAll('.store-image-remove').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const sid = btn.dataset.store;
          delete IMAGE_DATA[sid];
          renderStores();
          updatePreview();
        });
      });

      // Bind file input
      document.querySelectorAll('.store-file-input').forEach(input => {
        input.addEventListener('change', () => {
          if (input.files.length) handleStoreImage(input.dataset.store, input.files[0]);
        });
      });

      // Bind store checkbox change
      document.querySelectorAll('.store-cb').forEach(cb => {
        cb.addEventListener('change', updatePreview);
      });
    }

    async function handleStoreImage(storeId, file) {
      log(`Uploading image for ${storeId}: ${file.name}...`);
      const fd = new FormData();
      fd.append('image', file);
      fd.append('storeId', storeId);
      try {
        const res = await fetch('/api/adhoc/upload-store-image', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.ok) {
          IMAGE_DATA[storeId] = { imageUrl: data.data.imageUrl, localImagePath: data.data.localImagePath, filename: data.data.filename };
          renderStores();
          updatePreview();
          log(`Image for ${storeId}: ${data.data.filename}`, 'success');
        } else {
          log(`Upload failed for ${storeId}: ${data.error}`, 'error');
        }
      } catch (e) {
        log(`Upload error for ${storeId}: ${e.message}`, 'error');
      }
    }

    // ── Character counts ──────────────────────────────────────────
    function updateCharCount() {
      const len = $('post-body').value.length;
      $('char-count').textContent = `${len} chars`;

      const activePlatforms = [];
      if ($('platform-fb').checked) activePlatforms.push('facebook');
      if ($('platform-ig').checked) activePlatforms.push('instagram');
      if ($('platform-gp').checked) activePlatforms.push('google');

      const el = $('platform-limits');
      if (activePlatforms.length === 0) { el.innerHTML = ''; return; }
      el.innerHTML = activePlatforms.map(p => {
        const limit = LIMITS[p];
        const over = len > limit;
        return `<span class="${over ? 'text-red-500 font-semibold' : ''}">${p}: ${len}/${limit}${over ? ' &#x26A0;' : ''}</span>`;
      }).join(' &middot; ');
    }

    // ── Live per-store preview ─────────────────────────────────────
    function updatePreview() {
      const title = $('post-title').value.trim();
      const body = $('post-body').value.trim();
      const storeCbs = [...document.querySelectorAll('.store-cb:checked')];
      const previewSection = $('live-preview-section');
      const container = $('store-previews');

      if (!title && !body) { previewSection.classList.add('hidden'); return; }

      previewSection.classList.remove('hidden');
      container.innerHTML = storeCbs.map(cb => {
        const sid = cb.dataset.store;
        const name = STORE_NAMES[sid] || sid;
        const slug = getStoreSlug(name);
        const imgData = IMAGE_DATA[sid] || {};
        const brandedTitle = `Naturals Unisex Salon ${name} - ${title || '(no title)'}`;
        const offersUrl = `https://naturalsprime.in/${slug}/offers/`;
        const brandedBody = `${body || '(no body)'}\n\n\u{1F4CD} Visit: ${offersUrl}`;
        return `<div class="preview-card">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xs font-bold text-purple-700">${sid}</span>
            <span class="text-xs text-gray-400 truncate">${name}</span>
            ${imgData.imageUrl ? '<span class="text-xs text-green-600">&#x1F5BC;</span>' : '<span class="text-xs text-red-400">&#x26A0; No image</span>'}
          </div>
          <p class="text-xs font-semibold text-gray-800 break-words">${escHtml(brandedTitle)}</p>
          <p class="text-xs text-gray-600 mt-0.5 whitespace-pre-wrap break-words line-clamp-3">${escHtml(brandedBody)}</p>
          <a href="${offersUrl}" target="_blank" class="text-xs text-purple-600 hover:underline mt-0.5 inline-block">${offersUrl}</a>
          ${imgData.imageUrl ? `<img src="/campaigns/adhoc/03_published/${escHtml(imgData.filename || '')}" class="mt-1 h-12 w-auto rounded border border-gray-100 object-cover cursor-pointer" onerror="this.style.display='none'">` : ''}
        </div>`;
      }).join('');
      enableImageModals(container);
      updateCharCount();

      const hasImageForSome = storeCbs.some(cb => IMAGE_DATA[cb.dataset.store]);
      const msg = $('no-store-images-msg');
      if (storeCbs.length > 0 && !hasImageForSome) {
        msg.classList.remove('hidden');
      } else {
        msg.classList.add('hidden');
      }
    }

    // ── AI generate ────────────────────────────────────────────────
    $('btn-generate-ai').addEventListener('click', async () => {
      const title = $('post-title').value.trim();
      if (!title) { log('Enter a title first', 'error'); return; }
      $('btn-generate-ai').disabled = true;
      $('btn-generate-ai').textContent = '...';
      try {
        const res = await fetch('/api/adhoc/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title }) });
        const data = await res.json();
        if (data.ok) {
          $('post-body').value = data.data.body;
          updatePreview();
          log('Body generated by AI', 'success');
        } else {
          log(`AI generation failed: ${data.error}`, 'error');
        }
      } catch (e) {
        log(`AI error: ${e.message}`, 'error');
      }
      $('btn-generate-ai').disabled = false;
      $('btn-generate-ai').textContent = '\u{2B06} Generate';
    });

    // ── Store select all/none ──────────────────────────────────────
    $('btn-select-all-stores').addEventListener('click', () => {
      document.querySelectorAll('.store-cb').forEach(cb => cb.checked = true);
      updatePreview();
    });
    $('btn-deselect-all-stores').addEventListener('click', () => {
      document.querySelectorAll('.store-cb').forEach(cb => cb.checked = false);
      updatePreview();
    });

    // ── Events that trigger preview update ─────────────────────────
    ['post-title', 'post-body'].forEach(id => {
      $(id).addEventListener('input', updatePreview);
    });
    ['post-start', 'post-end'].forEach(id => {
      $(id).addEventListener('input', () => {});
    });
    document.querySelectorAll('#platform-fb, #platform-ig, #platform-gp').forEach(el => {
      el.addEventListener('change', updatePreview);
    });

    // ── Publish ────────────────────────────────────────────────────
    function getStoreImagesPayload() {
      const map = {};
      STORE_ORDER.forEach(sid => {
        if (IMAGE_DATA[sid]) {
          map[sid] = IMAGE_DATA[sid];
        }
      });
      return map;
    }

    async function doPublish(storeIdsOverride) {
      const title = $('post-title').value.trim();
      const body = $('post-body').value.trim();
      if (!title || !body) { log('Title and body are required', 'error'); return null; }

      const platforms = { facebook: $('platform-fb').checked, instagram: $('platform-ig').checked, google: $('platform-gp').checked };
      let storeIds = storeIdsOverride || [...document.querySelectorAll('.store-cb:checked')].map(cb => cb.dataset.store);
      const storeImages = getStoreImagesPayload();

      // Filter to only stores that have images
      const storesWithImages = storeIds.filter(sid => storeImages[sid]);
      if (storesWithImages.length === 0) {
        log('Upload an image for at least one selected store', 'error');
        return null;
      }

      if (!platforms.facebook && !platforms.instagram && !platforms.google) { log('Select at least one platform', 'error'); return null; }

      const startDate = $('post-start').value;
      const endDate = $('post-end').value;

      const postToWebsite = $('chk-post-website').checked;
      const contentType = $('content-type')?.value || 'offer';
      const googlePostType = $('google-post-type')?.value || 'STANDARD';

      log(`Publishing: "${title}" (${storesWithImages.join(', ')})`);

      try {
        const data = await api('/publish-adhoc-per-store', {
          method: 'POST',
          body: JSON.stringify({ title, body, startDate, endDate, platforms, storeIds: storesWithImages, storeImages, postToWebsite, contentType, googlePostType }),
        });
        log(`Done: ${data.message}`, 'success');
        if (data.output) data.output.split('\n').filter(l => l.trim()).forEach(l => log(`  ${l}`));
        return { title, body, startDate, endDate, platforms: { ...platforms, website: postToWebsite }, storeIds: storesWithImages, storeImages, postToWebsite, output: data.output || '' };
      } catch (err) {
        log(`Failed: ${err.message}`, 'error');
        if (err.output) err.output.split('\n').filter(l => l.trim()).forEach(l => log(`  ${l}`, 'error'));
        return { title, body, startDate, endDate, platforms: { ...platforms, website: postToWebsite }, storeIds: storesWithImages, storeImages, postToWebsite, output: err.output || err.message, error: true };
      }
    }

    $('btn-publish').addEventListener('click', async () => {
      $('btn-publish').disabled = true;
      $('btn-publish').textContent = '\u23F3 Publishing...';
      $('publish-status').textContent = '';
      $('result-section').classList.add('hidden');

      const result = await doPublish();
      if (result) {
        showResultTable(result);
        if (!result.error) $('publish-status').textContent = '\u2705 Done';
      }

      $('btn-publish').disabled = false;
      $('btn-publish').textContent = '\u{1F4E4} Publish Now';
    });

    // ── Result table ───────────────────────────────────────────────
    function showResultTable(result) {
      const section = $('result-section');
      section.classList.remove('hidden');

      const stores = result.storeIds;
      const platforms = ['facebook', 'instagram', 'google', 'website'];
      const activePlatforms = platforms.filter(p => result.platforms[p]);

      const storeResults = {};
      stores.forEach(s => { storeResults[s] = {}; activePlatforms.forEach(p => { storeResults[s][p] = null; }); });

      const outputLines = (result.output || '').split('\n');
      let currentStore = null;
      outputLines.forEach(line => {
        const storeMatch = line.match(/^📌 (.+?) \(Store_(\w+)\)/);
        if (storeMatch) currentStore = storeMatch[2];
        if (line.includes('Results:') && currentStore) {
          try {
            const resultsMatch = line.match(/\{.*\}/);
            if (resultsMatch) {
              const parsed = JSON.parse(resultsMatch[0].replace(/'/g, '"'));
              Object.entries(parsed).forEach(([k, v]) => { if (storeResults[currentStore]) storeResults[currentStore][k] = v; });
            }
          } catch (_) {}
        }
      });

      let html = '<table class="w-full text-xs border-collapse"><thead><tr class="bg-gray-100">';
      html += '<th class="px-2 py-1.5 text-left font-semibold text-gray-600">Store</th>';
      html += '<th class="px-2 py-1.5 text-left font-semibold text-gray-600">Image</th>';
      activePlatforms.forEach(p => { html += `<th class="px-2 py-1.5 text-center font-semibold text-gray-600 capitalize">${p}</th>`; });
      html += '<th class="px-2 py-1.5 text-center font-semibold text-gray-600">Retry</th></tr></thead><tbody>';

      let okCount = 0, totalCount = 0;
      stores.forEach(s => {
        const hasImg = result.storeImages && result.storeImages[s];
        html += `<tr class="border-t border-gray-100">
          <td class="px-2 py-1.5 font-medium">${s}</td>
          <td class="px-2 py-1.5 text-center">${hasImg ? '<span class="text-green-600">&#x2705;</span>' : '<span class="text-gray-300">&#x2014;</span>'}</td>`;
        activePlatforms.forEach(p => {
          const v = storeResults[s]?.[p];
          const ok = v === 'OK';
          if (ok) okCount++;
          totalCount++;
          html += `<td class="px-2 py-1.5 text-center"><span class="result-cell ${ok ? 'bg-green-100 text-green-700' : v === null ? 'bg-gray-100 text-gray-400' : 'bg-red-100 text-red-600'}">${ok ? '\u2705' : v === null ? '\u2014' : '\u274C'}</span></td>`;
        });
        const hasFailures = activePlatforms.some(p => storeResults[s]?.[p] && storeResults[s][p] !== 'OK');
        html += `<td class="px-2 py-1.5 text-center">${hasFailures ? `<button class="text-xs px-2 py-0.5 bg-yellow-100 text-yellow-700 rounded hover:bg-yellow-200 font-medium retry-store-btn" data-store="${s}">Retry</button>` : '\u2014'}</td>`;
        html += '</tr>';
      });
      html += '</tbody></table>';

      $('result-table').innerHTML = html;
      $('result-summary').textContent = `${okCount}/${totalCount} succeeded`;

      document.querySelectorAll('.retry-store-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = '...';
          const retryResult = await doPublish([btn.dataset.store]);
          if (retryResult) showResultTable(retryResult);
        });
      });

      const failedStores = stores.filter(s => activePlatforms.some(p => storeResults[s]?.[p] && storeResults[s][p] !== 'OK'));
      const retryAllBtn = $('btn-retry-all');
      if (failedStores.length > 0 && failedStores.length < stores.length) {
        retryAllBtn.classList.remove('hidden');
        retryAllBtn.onclick = async () => {
          retryAllBtn.disabled = true;
          retryAllBtn.textContent = '...';
          const retryResult = await doPublish(failedStores);
          if (retryResult) showResultTable(retryResult);
        };
      } else {
        retryAllBtn.classList.add('hidden');
      }
    }

    // ── Initial load ───────────────────────────────────────────────
    renderStores();
    updatePreview();
  </script>
  <script>Auth.protect('auth-container');</script>
</body>
</html>

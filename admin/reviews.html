<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://accounts.google.com 'unsafe-inline'; connect-src 'self' https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://script.google.com; style-src 'self' 'unsafe-inline' https://accounts.google.com https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://accounts.google.com; img-src 'self' data: blob: https://lh3.googleusercontent.com;">
<meta name="referrer" content="strict-origin-when-cross-origin">
<script src="config.js"></script>
<title>Review Report — Naturals Salon &amp; Spa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f4f6;color:#1f2937;line-height:1.5}
body.auth-locked #app-main{display:none}
body:not(.auth-locked) #auth-screen{display:none}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
#auth-screen .card{background:#fff;border-radius:1rem;padding:3rem 2.5rem;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:400px;width:100%}
#auth-screen h1{font-size:1.5rem;font-weight:700;color:#166534;margin-bottom:.25rem}
#auth-screen .sub{font-size:.875rem;color:#6b7280;margin-bottom:.25rem}
#auth-screen .role-info{font-size:.75rem;color:#9ca3af;margin-bottom:1.5rem;min-height:1.25rem}
#auth-screen button{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;background:#fff;border:1px solid #d1d5db;border-radius:.5rem;font-size:.875rem;font-weight:500;color:#374151;cursor:pointer;transition:all .15s}
#auth-screen button:hover{background:#f9fafb;border-color:#9ca3af}
#auth-screen .error{color:#dc2626;font-size:.75rem;margin-top:.75rem}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:.5rem}
header h1{font-size:1.125rem;font-weight:700;color:#166534}
header .user-info{display:flex;align-items:center;gap:.75rem;font-size:.8125rem;color:#6b7280}
header .user-info img{width:28px;height:28px;border-radius:50%}
header .user-info .role-badge{font-size:.625rem;font-weight:600;padding:.125rem .375rem;border-radius:.25rem;text-transform:uppercase}
header .user-info .role-owner{background:#fef3c7;color:#92400e}
header .user-info .role-clevel{background:#dbeafe;color:#1e40af}
header .user-info .role-store{background:#dcfce7;color:#166534}
header .user-info button{background:none;border:1px solid #d1d5db;border-radius:.375rem;padding:.25rem .75rem;font-size:.75rem;cursor:pointer;color:#6b7280}
header .user-info button:hover{background:#f3f4f6}
.page-wrap{display:flex;flex-direction:column;height:100vh}
.scroll-area{flex:1;overflow-y:auto;padding:1.5rem}
.scroll-area-inner{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:1.25rem}

/* Summary row */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.75rem}
.summary-card{background:#fff;border:1px solid #e5e7eb;border-radius:.5rem;padding:1rem;text-align:center}
.summary-card .num{font-size:1.75rem;font-weight:700;color:#166534}
.summary-card .num.amber{color:#92400e}
.summary-card .num.red{color:#dc2626}
.summary-card .lbl{font-size:.6875rem;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;margin-top:.125rem}

/* Per-store table */
.section-title{font-size:.8125rem;font-weight:600;color:#374151;margin-bottom:.5rem}
.store-table-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:.5rem;overflow:hidden}
.store-table{width:100%;border-collapse:collapse;font-size:.8125rem}
.store-table th{background:#f9fafb;padding:.5rem .75rem;text-align:left;font-weight:600;color:#6b7280;font-size:.6875rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e7eb}
.store-table td{padding:.5rem .75rem;border-bottom:1px solid #f3f4f6}
.store-table tr:last-child td{border-bottom:none}
.store-table .highlight{font-weight:600;color:#1f2937}
.store-table .count{font-weight:600;color:#166534}
.store-table .count.replied{color:#2563eb}
.store-table .count.unreplied{color:#dc2626}
.badge{padding:.125rem .375rem;border-radius:.25rem;font-size:.6875rem;font-weight:500}
.badge-ok{background:#dcfce7;color:#166534}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-muted{background:#f3f4f6;color:#9ca3af}
.store-filter{display:flex;gap:.5rem;flex-wrap:wrap}
.store-filter button{padding:.25rem .625rem;border:1px solid #d1d5db;border-radius:.375rem;background:#fff;font-size:.75rem;cursor:pointer;color:#6b7280;transition:all .15s}
.store-filter button:hover{border-color:#166534;color:#166534}
.store-filter button.active{background:#166534;border-color:#166534;color:#fff}

/* Recent reviews */
.review-card{background:#fff;border:1px solid #e5e7eb;border-radius:.5rem;padding:.75rem}
.review-card .meta{display:flex;align-items:center;gap:.5rem;font-size:.6875rem;color:#9ca3af;margin-bottom:.25rem}
.review-card .meta .store{font-weight:600;color:#166534}
.review-card .meta .stars{color:#f59e0b}
.review-card .customer{font-size:.8125rem;font-weight:600;color:#1f2937}
.review-card .text{font-size:.75rem;color:#6b7280;margin-top:.125rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.review-card .reply{font-size:.6875rem;color:#2563eb;margin-top:.25rem;padding-top:.25rem;border-top:1px solid #f3f4f6}
.review-card .reply.missing{color:#dc2626}
.loading{text-align:center;padding:2rem;color:#9ca3af;font-size:.8125rem}

/* Activity bar */
.activity-bar{background:#fff;border-top:1px solid #e5e7eb;padding:.5rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.activity-bar .label{font-size:.6875rem;font-weight:600;color:#6b7280;text-transform:uppercase}
.activity-bar button{font-size:.6875rem;color:#9ca3af;background:none;border:none;cursor:pointer}
.activity-bar button:hover{color:#6b7280}
.activity-log{font-family:monospace;font-size:.6875rem;max-height:5rem;overflow-y:auto;display:flex;flex-direction:column;gap:.125rem;flex:1;margin-left:1rem}
.activity-log .entry{color:#6b7280}
.activity-log .entry.success{color:#16a34a}
.activity-log .entry.info{color:#2563eb}
</style>
</head>
<body class="auth-locked">
<div id="auth-screen">
  <div class="card">
    <h1>&#x2B50; Review Report</h1>
    <p class="sub">Customer Feedback Analytics</p>
    <p class="role-info" id="auth-role-info">Sign in with your Google account</p>
    <div id="g_id_onload"
         data-client_id="816755094343-1ibdm0ecuhg90b50090rjoohkrlr9pd5.apps.googleusercontent.com"
         data-context="signin"
         data-callback="handleCredentialResponse"
         data-auto_select="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signin_with"
         data-size="large">
    </div>
    <div id="auth-error" class="error"></div>
  </div>
</div>

<div id="app-main" class="page-wrap">
  <header>
    <div style="display:flex;align-items:center;gap:.75rem">
      <a href="/admin/" style="font-size:.8125rem;color:#6b7280;text-decoration:none;display:flex;align-items:center;gap:.25rem">&#x2190; Dashboard</a>
      <h1>&#x2B50; Review Report</h1>
    </div>
    <div class="user-info" id="user-info">
      <img id="user-avatar" src="" alt="">
      <span id="user-name"></span>
      <span id="user-role-badge" class="role-badge"></span>
      <button id="btn-signout">Sign out</button>
    </div>
  </header>

  <div class="scroll-area">
    <div class="scroll-area-inner">

      <!-- Summary -->
      <div class="summary-row" id="summary-row">
        <div class="summary-card">
          <div class="num" id="stat-total">—</div>
          <div class="lbl">Total Reviews</div>
        </div>
        <div class="summary-card">
          <div class="num amber" id="stat-unreplied">—</div>
          <div class="lbl">Unreplied</div>
        </div>
        <div class="summary-card">
          <div class="num" id="stat-replied">—</div>
          <div class="lbl">Replied</div>
        </div>
        <div class="summary-card">
          <div class="num" id="stat-avg">—</div>
          <div class="lbl">Avg Rating</div>
        </div>
      </div>

      <!-- Per-store table -->
      <div>
        <div class="section-title">&#x1F3F7; Per-Store Breakdown</div>
        <div class="store-table-wrap">
          <table class="store-table" id="store-table">
            <thead>
              <tr>
                <th>Store</th>
                <th>ID</th>
                <th style="text-align:center">Total</th>
                <th style="text-align:center">Replied</th>
                <th style="text-align:center">Unreplied</th>
                <th style="text-align:center">Avg &#x2B50;</th>
              </tr>
            </thead>
            <tbody id="store-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Recent reviews -->
      <div>
        <div class="section-title">&#x1F4DD; Recent Reviews</div>
        <div class="store-filter" id="store-filter">
          <button class="active" data-store="">All Stores</button>
        </div>
        <div id="reviews-list" style="margin-top:.5rem;display:flex;flex-direction:column;gap:.5rem">
          <div class="loading">Loading reviews&hellip;</div>
        </div>
      </div>

    </div>
  </div>

  <div class="activity-bar">
    <span class="label">Activity</span>
    <div class="activity-log" id="activity-log"></div>
    <button id="btn-clear-log">Clear</button>
  </div>
</div>

<script>
(function(){
const $ = id => document.getElementById(id);
const logMsg = (msg, level='info') => {
  const el = $('activity-log');
  const ts = new Date().toLocaleTimeString('en-IN',{hour12:false});
  const cls = level === 'error' ? 'entry error' : level === 'success' ? 'entry success' : 'entry info';
  el.insertAdjacentHTML('afterbegin',`<div class="${cls}">${ts} ${msg}</div>`);
};

let currentUser = null;
let allReviews = [];
let filterStore = '';

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function starsHtml(n) {
  return '\u2B50'.repeat(parseInt(n) || 0) || '\u2B50'.repeat(5);
}

// ── Auth ─────────────────────────────────────────────────────────────
function handleCredentialResponse(credentialResponse) {
  const idToken = credentialResponse.credential;
  const parts = idToken.split('.');
  let payload;
  try {
    payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
  } catch(e) {
    $('auth-error').textContent = 'Failed to parse token';
    return;
  }
  const email = payload.email || '';
  if (!email) {
    $('auth-error').textContent = 'Email not found in token';
    return;
  }
  currentUser = {
    email: email,
    name: payload.name || email,
    picture: payload.picture || '',
  };
  window.__userEmail = email;
  $('user-name').textContent = currentUser.name;
  $('user-avatar').src = currentUser.picture;
  const roleBadge = $('user-role-badge');
  roleBadge.textContent = 'manager';
  roleBadge.className = 'role-badge role-store';
  document.body.classList.remove('auth-locked');
  logMsg('Signed in as ' + currentUser.email, 'success');
  loadData();
}

window.handleCredentialResponse = handleCredentialResponse;

$('btn-signout').onclick = () => {
  currentUser = null;
  document.body.classList.add('auth-locked');
  logMsg('Signed out', 'info');
};

// ── Load data ────────────────────────────────────────────────────────
function loadData() {
  const rpt = window.REVIEW_SUMMARY;
  if (rpt && rpt.total) {
    $('stat-total').textContent = rpt.total;
    $('stat-replied').textContent = rpt.replied;
    $('stat-avg').textContent = rpt.avgStars;
    $('stat-unreplied').textContent = rpt.total - rpt.replied;

    const tbody = $('store-tbody');
    tbody.innerHTML = rpt.perStore.filter(s => s.id).map(s => {
      const unreplied = s.total - s.replied;
      return `<tr>
        <td class="highlight">${escHtml(s.store)}</td>
        <td style="color:#9ca3af;font-size:.75rem">${s.id}</td>
        <td style="text-align:center" class="count">${s.total}</td>
        <td style="text-align:center"><span class="count replied">${s.replied}</span></td>
        <td style="text-align:center"><span class="count ${unreplied > 0 ? 'unreplied' : ''}">${unreplied}</span></td>
        <td style="text-align:center">${s.avgStars} &#x2B50;</td>
      </tr>`;
    }).join('');

    // Build store filter buttons
    const filterEl = $('store-filter');
    rpt.perStore.filter(s => s.id).forEach(s => {
      filterEl.insertAdjacentHTML('beforeend', `<button data-store="${escHtml(s.store)}">${escHtml(s.store)}</button>`);
    });
    filterEl.addEventListener('click', e => {
      if (e.target.tagName !== 'BUTTON') return;
      filterEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      filterStore = e.target.dataset.store || '';
      renderReviews();
    });
  }

  // Fetch recent reviews
  const apiUrl = '/api/reviews-data?limit=50';
  fetch(apiUrl)
    .then(r => r.json())
    .then(res => {
      if (res.ok) {
        allReviews = res.data || [];
        renderReviews();
      } else {
        $('reviews-list').innerHTML = '<div class="loading">No review data available</div>';
      }
    })
    .catch(() => {
      $('reviews-list').innerHTML = '<div class="loading">Could not load reviews</div>';
    });
}

function renderReviews() {
  const list = $('reviews-list');
  const filtered = filterStore ? allReviews.filter(r => r.store_name === filterStore) : allReviews;
  if (filtered.length === 0) {
    list.innerHTML = '<div class="loading">No reviews to display</div>';
    return;
  }
  list.innerHTML = filtered.map(r => {
    const hasReply = !!(r.response && r.response.trim());
    const replyHtml = hasReply
      ? `<div class="reply">&#x1F4AC; ${escHtml(r.response.substring(0, 120))}${r.response.length > 120 ? '&hellip;' : ''}</div>`
      : `<div class="reply missing">&#x2716; No reply</div>`;
    return `<div class="review-card">
      <div class="meta">
        <span class="store">${escHtml(r.store_name)}</span>
        <span class="stars">${starsHtml(r.stars)}</span>
        <span>${escHtml(r.date_posted || '')}</span>
        <span class="${hasReply ? 'badge badge-ok' : 'badge badge-warn'}">${hasReply ? 'Replied' : 'Pending'}</span>
      </div>
      <div class="customer">${escHtml(r.customer_name || 'Anonymous')}</div>
      <div class="text">${escHtml(r.review_comments || '')}</div>
      ${replyHtml}
    </div>`;
  }).join('');
}

(function init() {
  logMsg('Review report ready', 'info');
})();

$('btn-clear-log').onclick = () => { $('activity-log').innerHTML = ''; };
})();
</script>
<script src="https://accounts.google.com/gsi/client"></script>
</body>
</html>

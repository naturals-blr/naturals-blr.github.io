.btn-call{background:#5F6368;color:#fff;padding:13px 22px;min-height:48px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:all 0.3s;border-radius:6px;white-space:nowrap;text-decoration:none;}

.btn-maps{background:#A82424;color:#fff;border:none;padding:13px 18px;min-height:48px;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:all 0.3s;border-radius:6px;white-space:nowrap;text-decoration:none;}

.btn-primary{background:var(--gold);color:var(--dark);padding:14px 28px;min-height:48px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all 0.3s;border-radius:6px;text-decoration:none;border:1px solid transparent;cursor:pointer;}

.btn-secondary{background:transparent;color:var(--text);padding:10px 20px;min-height:40px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all 0.3s;border-radius:6px;text-decoration:none;border:1px solid rgba(0,0,0,0.12);cursor:pointer;}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.04);}
.page-hero-inner .btn-secondary{color:#fff;border-color:rgba(255,255,255,0.4);}
.page-hero-inner .btn-secondary:hover{border-color:#fff;background:rgba(255,255,255,0.1);}
</style>

<style>
footer{background:#080f0b;}
[data-theme="naturals"] footer{background:#0D0120;}
.ft-top{padding:60px 60px 40px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;border-bottom:1px solid rgba(255,255,255,0.07);}
.ft-brand{font-family:'Cormorant Garamond',serif;font-size:28px;color:#fff;font-weight:300;margin-bottom:10px;}
.ft-brand span{color:var(--gold);font-style:italic;}
.ft-tagline{font-size:12px;color:rgba(255,255,255,0.28);font-weight:300;line-height:1.7;margin-bottom:18px;}
.ft-col-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:16px;}
.ft-col ul{list-style:none;display:flex;flex-direction:column;gap:9px;}
.ft-col ul a{font-size:12px;color:rgba(255,255,255,0.32);font-weight:300;transition:color 0.3s;text-decoration:none;}
.ft-col ul a:hover{color:rgba(255,255,255,0.72);}
.ft-bottom{padding:18px 60px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}

.ft-url{font-size:11px;color:rgba(255,255,255,0.18);letter-spacing:1px;}

@media(max-width:600px){.ft-top{grid-template-columns:1fr;padding:28px 16px 20px;}}

<style>
:root{ --dark:#111714;--green:#1B4332;--green-mid:#2D6A4F;--green-soft:#52B788; --cream:#F8F4EE;--gold:#C9A84C;--gold-pale:#EDD9A3; --text:#1A1A1A;--text-mid:#555;--text-light:#999; --hero-tint:rgba(17,23,20,0.88);--hero-tint2:rgba(17,23,20,0.45); --filter-bg:#111714;--card-hover-border:#C9A84C; --nav-bg:rgba(17,23,20,0.97); } [data-theme="naturals"]{ --dark:#1A0533;--green:#2596BE;--green-mid:#7B2FBE;--green-soft:#B678F0; --cream:#FAF7FF;--gold:#C9A84C;--gold-pale:#EDD9A3; --text:#1A1A1A;--text-mid:#4A4458;--text-light:#8B7FA8; --hero-tint:rgba(26,5,51,0.87);--hero-tint2:rgba(58,10,100,0.45); --filter-bg:#1A0533;--card-hover-border:#7B2FBE; --nav-bg:rgba(26,5,51,0.97); }

body { 
background: var(--dark); 
color: #fff; 
font-family: Jost, sans-serif; 
margin: 0; 
padding: 0; 
min-height: 100vh; 
}

.training-container {
max-width: 1200px;
margin: 0 auto;
padding: 40px 20px;
}

/* Header */
.training-header {
text-align: center;
margin-bottom: 60px;
}

.training-title {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(32px, 5vw, 48px);
font-weight: 300;
color: #fff;
margin-bottom: 16px;
}

.training-title em {
font-style: italic;
color: var(--gold);
}

.training-subtitle {
font-size: 16px;
color: rgba(255,255,255,0.7);
max-width: 600px;
margin: 0 auto;
line-height: 1.6;
}

/* Navigation */
.training-nav {
display: flex;
justify-content: center;
gap: 20px;
margin-bottom: 40px;
flex-wrap: wrap;
}

.nav-btn {
padding: 10px 20px;
border: 1px solid rgba(255,255,255,0.2);
background: rgba(255,255,255,0.1);
color: #fff;
border-radius: 25px;
cursor: pointer;
transition: all 0.3s ease;
font-family: 'Jost', sans-serif;
font-size: 14px;
font-weight: 500;
}

.nav-btn:hover {
background: var(--gold);
color: var(--dark);
border-color: var(--gold);
}

.nav-btn.active {
background: var(--gold);
color: var(--dark);
border-color: var(--gold);
}

/* Training Grid */
.training-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
gap: 30px;
margin-bottom: 60px;
}

.training-card {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 16px;
padding: 24px;
transition: all 0.3s ease;
cursor: pointer;
}

.training-card:hover {
background: rgba(255,255,255,0.08);
border-color: var(--gold);
transform: translateY(-4px);
}

.training-card-header {
display: flex;
align-items: center;
margin-bottom: 16px;
}

.training-icon {
width: 48px;
height: 48px;
background: var(--gold);
border-radius: 12px;
display: flex;
align-items: center;
justify-content: center;
font-size: 24px;
margin-right: 16px;
flex-shrink: 0;
}

.training-category {
font-size: 12px;
text-transform: uppercase;
color: var(--gold);
font-weight: 600;
letter-spacing: 1px;
margin-bottom: 4px;
}

.training-title {
font-size: 20px;
font-weight: 600;
color: #fff;
margin: 0;
}

.training-description {
color: rgba(255,255,255,0.7);
font-size: 14px;
line-height: 1.6;
margin-bottom: 20px;
}

.training-meta {
display: flex;
justify-content: space-between;
align-items: center;
font-size: 12px;
color: rgba(255,255,255,0.5);
}

.training-duration {
display: flex;
align-items: center;
gap: 4px;
}

.training-level {
padding: 4px 8px;
background: rgba(255,255,255,0.1);
border-radius: 12px;
font-weight: 500;
}

.training-level.beginner { background: rgba(82, 183, 136, 0.2); color: #52B788; }
.training-level.intermediate { background: rgba(201, 168, 76, 0.2); color: var(--gold); }
.training-level.advanced { background: rgba(225, 64, 95, 0.2); color: #E4405F; }

/* Back Link */
.back-link {
display: inline-flex;
align-items: center;
gap: 8px;
color: rgba(255,255,255,0.7);
text-decoration: none;
font-size: 14px;
margin-bottom: 20px;
transition: color 0.3s ease;
}

/* Back Link */
.back-link {
display: inline-flex;
align-items: center;
gap: 8px;
color: rgba(255,255,255,0.7);
text-decoration: none;
font-size: 14px;
margin-bottom: 20px;
transition: color 0.3s ease;
}

.back-link:hover {
color: var(--gold);
}

/* Mobile Responsive */
@media (max-width: 768px) {
.training-container {
padding: 20px 16px;
}

.training-grid {
grid-template-columns: 1fr;
gap: 20px;
}

.training-nav {
gap: 10px;
}

.nav-btn {
padding: 8px 16px;
font-size: 12px;
}
}
</style>
</head>

<script>
// Training data from template
const trainingModules = [{"is_active": true, "is_featured": true, "key_takeaways": ["Proper sectioning techniques", "Elevation control", "Face shape analysis", "Layer distribution"], "target_role": ["stylist", "senior_stylist"], "training_category": "techniques", "training_date_added": "2024-01-15", "training_description": "Master the art of precision layer cutting for different hair types and face shapes. Learn proper sectioning, elevation, and cutting angles for professional results.", "training_duration": "45 min", "training_id": "TR001", "training_level": "intermediate", "training_link": "https://example.com/layer-cutting-video", "training_source": "Naturals Academy", "training_thumbnail_link": "/images/training/layer-cutting-thumb.jpg", "training_title": "Advanced Layer Cutting"}, {"is_active": true, "is_featured": true, "key_takeaways": ["Balayage fundamentals", "Color theory application", "Foil placement", "Processing timing"], "target_role": ["senior_stylist", "color_specialist"], "training_category": "techniques", "training_date_added": "2024-01-20", "training_description": "Learn professional color blending methods for natural-looking highlights and lowlights. Master balayage, ombr\u00e9, and color melting techniques.", "training_duration": "60 min", "training_id": "TR002", "training_level": "advanced", "training_link": "https://example.com/color-blending-video", "training_source": "L\u0027Or\u00e9al Professional", "training_thumbnail_link": "/images/training/color-blending-thumb.jpg", "training_title": "Color Blending Techniques"}, {"is_active": true, "is_featured": false, "key_takeaways": ["Scissor grip techniques", "Blade maintenance", "Cutting precision", "Tool sanitation"], "target_role": ["junior_stylist", "stylist"], "training_category": "tools", "training_date_added": "2024-02-01", "training_description": "Proper handling and maintenance of professional hair cutting scissors. Learn different cutting techniques and scissor care.", "training_duration": "30 min", "training_id": "TR003", "training_level": "beginner", "training_link": "https://example.com/scissor-techniques-video", "training_source": "Naturals Academy", "training_thumbnail_link": "/images/training/scissor-techniques-thumb.jpg", "training_title": "Professional Scissor Techniques"}, {"is_active": true, "is_featured": false, "key_takeaways": ["Heat protection products", "Temperature control", "Tool selection", "Damage prevention"], "target_role": ["junior_stylist", "stylist"], "training_category": "tools", "training_date_added": "2024-02-10", "training_description": "Safe and effective use of thermal styling tools including flat irons, curling wands, and blow dryers. Learn temperature settings and protection techniques.", "training_duration": "25 min", "training_id": "TR004", "training_level": "beginner", "training_link": "https://example.com/thermal-styling-video", "training_source": "Wella Professionals", "training_thumbnail_link": "/images/training/thermal-styling-thumb.jpg", "training_title": "Thermal Styling Safety"}, {"is_active": true, "is_featured": true, "key_takeaways": ["Active listening", "Service recommendation", "Client assessment", "Building rapport"], "target_role": ["stylist", "senior_stylist"], "training_category": "service", "training_date_added": "2024-02-15", "training_description": "Effective communication techniques for customer consultations and service recommendations. Learn to assess client needs and suggest appropriate services.", "training_duration": "40 min", "training_id": "TR005", "training_level": "intermediate", "training_link": "https://example.com/consultation-skills-video", "training_source": "Naturals Academy", "training_thumbnail_link": "/images/training/consultation-skills-thumb.jpg", "training_title": "Customer Consultation Skills"}, {"is_active": true, "is_featured": false, "key_takeaways": ["Service excellence", "Client retention", "Upselling techniques", "Brand representation"], "target_role": ["senior_stylist", "manager"], "training_category": "service", "training_date_added": "2024-02-20", "training_description": "Delivering exceptional service that exceeds customer expectations and builds loyalty. Learn upselling techniques and service enhancement.", "training_duration": "35 min", "training_id": "TR006", "training_level": "advanced", "training_link": "https://example.com/premium-service-video", "training_source": "Naturals Academy", "training_thumbnail_link": "/images/training/premium-service-thumb.jpg", "training_title": "Premium Service Experience"}, {"is_active": true, "is_featured": true, "key_takeaways": ["Trending color palettes", "Application techniques", "Seasonal trends", "Client preferences"], "target_role": ["stylist", "senior_stylist", "color_specialist"], "training_category": "trends", "training_date_added": "2024-03-01", "training_description": "Latest color trends and techniques for modern salon services. Stay ahead with trending colors and application methods.", "training_duration": "50 min", "training_id": "TR007", "training_level": "intermediate", "training_link": "https://example.com/2024-color-trends-video", "training_source": "Schwarzkopf Professional", "training_thumbnail_link": "/images/training/2024-color-trends-thumb.jpg", "training_title": "2024 Hair Color Trends"}, {"is_active": true, "is_featured": false, "key_takeaways": ["Current hair trends", "Styling products", "Finishing techniques", "Social media trends"], "target_role": ["stylist", "senior_stylist"], "training_category": "trends", "training_date_added": "2024-03-05", "training_description": "Contemporary styling techniques and trending hairstyles for 2024. Learn modern cuts, styles, and finishing techniques.", "training_duration": "45 min", "training_id": "TR008", "training_level": "intermediate", "training_link": "https://example.com/modern-styling-trends-video", "training_source": "Redken", "training_thumbnail_link": "/images/training/modern-styling-trends-thumb.jpg", "training_title": "Modern Hair Styling Trends"}, {"is_active": true, "is_featured": false, "key_takeaways": ["Men\u0027s cutting techniques", "Beard shaping", "Clipper work", "Classic styles"], "target_role": ["junior_stylist", "stylist"], "training_category": "techniques", "training_date_added": "2024-03-10", "training_description": "Essential techniques for men\u0027s haircutting and grooming. Learn classic cuts, beard trimming, and modern men\u0027s styles.", "training_duration": "35 min", "training_id": "TR009", "training_level": "beginner", "training_link": "https://example.com/mens-grooming-video", "training_source": "Naturals Academy", "training_thumbnail_link": "/images/training/mens-grooming-thumb.jpg", "training_title": "Men\u0027s Grooming Fundamentals"}, {"is_active": true, "is_featured": false, "key_takeaways": ["Product knowledge", "Sales techniques", "Customer education", "Revenue enhancement"], "target_role": ["stylist", "senior_stylist"], "training_category": "service", "training_date_added": "2024-03-15", "training_description": "Master retail sales techniques for salon products. Learn product knowledge, sales psychology, and customer education.", "training_duration": "30 min", "training_id": "TR010", "training_level": "intermediate", "training_link": "https://example.com/retail-sales-video", "training_source": "Naturals Academy", "training_thumbnail_link": "/images/training/retail-sales-thumb.jpg", "training_title": "Retail Sales Excellence"}, {"is_active": true, "is_featured": false, "key_takeaways": ["Safety protocols", "Chemical handling", "Ventilation requirements", "Emergency procedures"], "target_role": ["junior_stylist", "stylist", "senior_stylist"], "training_category": "tools", "training_date_added": "2024-03-20", "training_description": "Essential safety procedures for handling chemical treatments including color, perm, and straightening products.", "training_duration": "20 min", "training_id": "TR011", "training_level": "beginner", "training_link": "https://example.com/chemical-safety-video", "training_source": "Safety Compliance Board", "training_thumbnail_link": "/images/training/chemical-safety-thumb.jpg", "training_title": "Chemical Safety Protocols"}, {"is_active": true, "is_featured": true, "key_takeaways": ["Sustainable practices", "Waste reduction", "Eco-friendly products", "Green salon certification"], "target_role": ["stylist", "senior_stylist", "manager"], "training_category": "trends", "training_date_added": "2024-03-25", "training_description": "Learn eco-friendly salon practices and sustainable beauty techniques. Reduce environmental impact while maintaining quality service.", "training_duration": "40 min", "training_id": "TR012", "training_level": "intermediate", "training_link": "https://example.com/sustainable-salon-video", "training_source": "Green Salon Collective", "training_thumbnail_link": "/images/training/sustainable-salon-thumb.jpg", "training_title": "Sustainable Salon Practices"}];

// Category icons mapping - minimal fallback
const categoryIcons = {
'techniques': '✂️',
'tools': '🔧',
'service': '👥',
'trends': '🌟',
'safety': '⚠️',
'retail': '💰',
'grooming': '💈'
};

let currentCategory = 'all';

function generateCategories() {
const nav = document.getElementById('trainingNav');
const categories = ['all'];

// Extract unique categories from training data
trainingModules.forEach(module => {
if (module.training_category && !categories.includes(module.training_category)) {
categories.push(module.training_category);
}
});

// Generate navigation buttons
nav.innerHTML = '';
categories.forEach(category => {
const btn = document.createElement('button');
btn.className = 'nav-btn';
if (category === 'all') {
btn.classList.add('active');
}
btn.dataset.category = category;
btn.textContent = category === 'all' ? 'All Training' : 
category.charAt(0).toUpperCase() + category.slice(1).replace('_', ' ');
nav.appendChild(btn);
});

// Add event listeners
nav.querySelectorAll('.nav-btn').forEach(btn => {
btn.addEventListener('click', () => {
nav.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
currentCategory = btn.dataset.category;
renderTraining();
});
});
}

function renderTraining() {
const grid = document.getElementById('trainingGrid');
grid.innerHTML = '';

const filteredModules = currentCategory === 'all' 
? trainingModules 
: trainingModules.filter(module => module.training_category === currentCategory);

// Sort by featured status and date added
filteredModules.sort((a, b) => {
if (a.is_featured && !b.is_featured) return -1;
if (!a.is_featured && b.is_featured) return 1;
return new Date(b.training_date_added) - new Date(a.training_date_added);
});

filteredModules.forEach(module => {
const card = document.createElement('div');
card.className = 'training-card';
if (module.is_featured) {
card.style.border = '2px solid var(--gold)';
}

const icon = categoryIcons[module.training_category] || '📚';
const categoryName = module.training_category ? 
module.training_category.charAt(0).toUpperCase() + module.training_category.slice(1).replace('_', ' ') : 'Other';

card.innerHTML = `
<div class="training-card-header">
<div class="training-icon">${icon}</div>
<div>
<div class="training-category">${categoryName}</div>
<h3 class="training-title">${module.training_title || 'Untitled Training'}</h3>
</div>
</div>
<p class="training-description">${module.training_description || 'No description available.'}</p>
<div class="training-meta">
<div class="training-duration">
⏱️ ${module.training_duration || 'Duration not specified'}
</div>
<div class="training-level ${module.training_level || 'beginner'}">${module.training_level || 'beginner'}</div>
</div>
`;

card.addEventListener('click', () => {
if (module.training_link && module.training_link !== 'https://example.com/' && module.training_link !== '') {
window.open(module.training_link, '_blank');
} else {
alert(`Training module "${module.training_title}" would open here. This is a placeholder for the actual video training content.`);
}
});

grid.appendChild(card);
});

// Show message if no modules found
if (filteredModules.length === 0) {
grid.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.6);">No training modules found for this category.</p>';
}
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
generateCategories();
renderTraining();

// Personalize back link with staff name
const staffName = localStorage.getItem("staff_name");
if (staffName) {
const backLink = document.getElementById("backLink");
if (backLink) {
backLink.textContent = `← Back to ${staffName}'s Home`;
}
}
});
</script>
</body>
</html>

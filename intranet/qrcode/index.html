function render(){
const grid=document.getElementById("qrGrid");
grid.innerHTML="";
stores.forEach(store=>{
if(currentStore!=="all" && store.store_id_short!==currentStore) return;
qrTypes.forEach(p=>{
if(currentPlatform!=="all" && p!==currentPlatform) return;
const img=`/images/qrcodes/${store.store_id_short}_${p.charAt(0).toUpperCase()+p.slice(1)}${p==='google'?'Review':''}.png`;
grid.innerHTML+=`
<div class="qr-card">
<img src="${img}">
<div class="qr-card-title">${p==="google"?"⭐ Google Review":p.toUpperCase()}</div>
<div class="qr-card-subtitle">${store.store_display_name}</div>
<div class="qr-actions">
<button class="btn btn-show" onclick="showQR('${img}','${store.store_id_short}','${p}')">SHOW QR</button>
<button class="btn btn-${p==='facebook'?'fb':p==='instagram'?'ig':'google'} btn-open"
onclick="openLink('${getURL(store,p)}','${store.store_id_short}','${p}')">
${p==='facebook'?getFacebookIcon():p==='instagram'?getInstagramIcon():getGoogleIcon()}
OPEN
</button>
</div>
</div>`;
});
});
}

function showQR(img,store,platform){
document.getElementById("qrImg").src=img;
document.getElementById("qrOverlay").style.display="flex";
trackEvent("show_qr",store,platform);
}

function closeQR(){document.getElementById("qrOverlay").style.display="none"}

function openLink(url,store,platform){
window.open(url,"_blank");
trackEvent("open_platform",store,platform);
}

/* 🔹 CLIENT-SIDE TRACKING (Google Apps Script ready) */
function trackEvent(event,store,platform){
fetch("https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec",{
method:"POST",
body:JSON.stringify({
event: event,
store: store, 
platform: platform,
page:location.pathname,
ts:new Date().toISOString()
})
}).catch(err=>console.error(err));
}

document.querySelectorAll(".filter-btn").forEach(b=>{
b.onclick=()=>{
b.parentElement.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
b.classList.add("active");
if(b.dataset.store){
currentStore=b.dataset.store;
localStorage.setItem("qrSelectedStore",currentStore);
}
if(b.dataset.platform){
currentPlatform=b.dataset.platform;
localStorage.setItem("qrSelectedPlatform",currentPlatform);
}
render();
};
});

// Load saved selections on page load
const savedStore=localStorage.getItem("qrSelectedStore");
const savedPlatform=localStorage.getItem("qrSelectedPlatform");

if(savedStore){
currentStore=savedStore;
document.querySelectorAll("#storeFilters .filter-btn").forEach(btn=>{
btn.classList.remove("active");
if(btn.dataset.store===savedStore) btn.classList.add("active");
});
}

if(savedPlatform){
currentPlatform=savedPlatform;
document.querySelectorAll("#platformFilters .filter-btn").forEach(btn=>{
btn.classList.remove("active");
if(btn.dataset.platform===savedPlatform) btn.classList.add("active");
});
}

// Personalize back link with staff name
const staffName = localStorage.getItem("staff_name");
if (staffName) {
const backLink = document.getElementById("backLink");
if (backLink) {
backLink.textContent = `← Back to ${staffName}'s Home`;
}

const reviewMessage = document.getElementById("reviewMessage");
if (reviewMessage) {
reviewMessage.textContent = `"${staffName}, it's Review Time! Show the Google QR code to capture your 5-star finish."`;
}
}

render();
</script>

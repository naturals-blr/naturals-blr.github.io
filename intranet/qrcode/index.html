<style>
.btn-book{background:#1A73E8;color:#fff;padding:13px 22px;min-height:48px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:all 0.3s;border-radius:6px;white-space:nowrap;text-decoration:none;}
.btn-book:hover{background:#1557B0;transform:translateY(-1px);}
.btn-wa{background:#25D366;color:#fff;padding:13px 22px;min-height:48px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:all 0.3s;border-radius:6px;white-space:nowrap;text-decoration:none;}
.btn-wa:hover{background:#1da851;transform:translateY(-1px);}
.btn-call{background:#5F6368;color:#fff;padding:13px 22px;min-height:48px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:all 0.3s;border-radius:6px;white-space:nowrap;text-decoration:none;}
.btn-call:hover{background:#474c52;transform:translateY(-1px);}
.btn-maps{background:#A82424;color:#fff;border:none;padding:13px 18px;min-height:48px;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:all 0.3s;border-radius:6px;white-space:nowrap;text-decoration:none;}
.btn-maps:hover{background:#8e1f1f;transform:translateY(-1px);}
.btn-gold{background:var(--gold);color:var(--dark);padding:12px 24px;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;display:inline-flex;align-items:center;gap:8px;transition:all 0.3s;text-decoration:none;}
.btn-gold:hover{background:var(--gold-pale);transform:translateY(-1px);}

/* UNIFIED BUTTON SYSTEM */
.btn-primary{background:var(--gold);color:var(--dark);padding:14px 28px;min-height:48px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all 0.3s;border-radius:6px;text-decoration:none;border:1px solid transparent;cursor:pointer;}
.btn-primary:hover{background:#b5943b;transform:translateY(-2px);box-shadow:0 8px 16px rgba(0,0,0,0.12);}

.btn-secondary{background:transparent;color:var(--text);padding:10px 20px;min-height:40px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all 0.3s;border-radius:6px;text-decoration:none;border:1px solid rgba(0,0,0,0.12);cursor:pointer;}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.04);}
.page-hero-inner .btn-secondary{color:#fff;border-color:rgba(255,255,255,0.4);}
.page-hero-inner .btn-secondary:hover{border-color:#fff;background:rgba(255,255,255,0.1);}
</style>

<style>
footer{background:#080f0b;}
[data-theme="naturals"] footer{background:#0D0120;}
.ft-top{padding:60px 60px 40px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;border-bottom:1px solid rgba(255,255,255,0.07);}
.ft-brand{font-family:'Cormorant Garamond',serif;font-size:28px;color:#fff;font-weight:300;margin-bottom:10px;}
.ft-brand span{color:var(--gold);font-style:italic;}
.ft-tagline{font-size:12px;color:rgba(255,255,255,0.28);font-weight:300;line-height:1.7;margin-bottom:18px;}
.ft-col-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:16px;}
.ft-col ul{list-style:none;display:flex;flex-direction:column;gap:9px;}
.ft-col ul a{font-size:12px;color:rgba(255,255,255,0.32);font-weight:300;transition:color 0.3s;text-decoration:none;}
.ft-col ul a:hover{color:rgba(255,255,255,0.72);}
.ft-bottom{padding:18px 60px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}

<style>
body { background:#111714; color:#fff; font-family:Jost,sans-serif; margin:0; }
.qr-container{max-width:1200px;margin:auto;padding:40px 20px}
.qr-title{font-family:"Cormorant Garamond";font-size:36px}
.qr-title em{color:#C9A84C}
.filter-section{background:#1a1f1c;border-radius:16px;padding:24px;margin-bottom:32px}
.filter-btn{padding:8px 16px;border-radius:20px;border:1px solid #444;background:#222;color:#bbb;cursor:pointer}
.filter-btn.active{background:#C9A84C;color:#111}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.qr-card{background:#1a1f1c;border-radius:16px;padding:20px;text-align:center}
.qr-card img{width:180px;height:180px;object-fit:contain}
.qr-card-title{font-weight:600;margin-top:12px}
.qr-card-subtitle{color:#C9A84C;font-size:12px;text-transform:uppercase}
.qr-actions{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:10px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.btn-show{background:#C9A84C;color:#111}
.btn-fb{background:#0866FF;color:#fff}
.btn-ig{background:#E4405F;color:#fff}
.btn-google{background:#4285F4;color:#fff}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;z-index:9999}
.overlay img{width:320px;height:320px}
.close{position:absolute;top:20px;right:20px;color:#fff;font-size:20px;cursor:pointer}

/* ── Enhanced QR Card Buttons ── */
.btn-open {
display: flex;
align-items: center;
gap: 8px;
justify-content: center;
min-height: 44px;
transition: all 0.3s ease;
position: relative;
overflow: hidden;
}

.btn-open:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.btn-icon {
flex-shrink: 0;
display: inline-block;
vertical-align: middle;
}

/* Facebook Button Enhanced */
.btn-fb.btn-open:hover {
background: #0756E6;
box-shadow: 0 6px 20px rgba(8, 102, 255, 0.4);
}

.btn-fb .btn-icon {
width: 16px;
height: 16px;
}

/* Instagram Button Enhanced */
.btn-ig.btn-open:hover {
background: #D93670;
box-shadow: 0 6px 20px rgba(225, 64, 95, 0.4);
}

.btn-ig .btn-icon {
width: 29px;
height: 29px;
}

/* Google Button Enhanced */
.btn-google.btn-open:hover {
background: #3367D6;
box-shadow: 0 6px 20px rgba(66, 133, 244, 0.4);
}

.btn-google .btn-icon {
width: 24px;
height: 24px;
}

/* Back Link */
.back-link {
display: inline-flex;
align-items: center;
gap: 8px;
color: rgba(255,255,255,0.7);
text-decoration: none;
font-size: 14px;
margin-bottom: 20px;
transition: color 0.3s ease;
}

.back-link:hover {
color: var(--gold);
}

/* Mobile Responsive */
@media (max-width: 768px) {
.btn-open {
min-height: 48px;
gap: 6px;
padding: 10px 12px;
}

.btn-fb .btn-icon {
width: 14px;
height: 14px;
}

.btn-ig .btn-icon {
width: 24px;
height: 24px;
}

.btn-google .btn-icon {
width: 20px;
height: 20px;
}
}
</style>

function render(){
const grid=document.getElementById("qrGrid");
grid.innerHTML="";
stores.forEach(store=>{
if(currentStore!=="all" && store.store_id_short!==currentStore) return;
qrTypes.forEach(p=>{
if(currentPlatform!=="all" && p!==currentPlatform) return;
const img=`/images/qrcodes/${store.store_id_short}_${p.charAt(0).toUpperCase()+p.slice(1)}${p==='google'?'Review':''}.png`;
grid.innerHTML+=`
<div class="qr-card">
<img src="${img}">
<div class="qr-card-title">${p==="google"?"⭐ Google Review":p.toUpperCase()}</div>
<div class="qr-card-subtitle">${store.store_display_name}</div>
<div class="qr-actions">
<button class="btn btn-show" onclick="showQR('${img}','${store.store_id_short}','${p}')">SHOW QR</button>
<button class="btn btn-${p==='facebook'?'fb':p==='instagram'?'ig':'google'} btn-open"
onclick="openLink('${getURL(store,p)}','${store.store_id_short}','${p}')">
${p==='facebook'?getFacebookIcon():p==='instagram'?getInstagramIcon():getGoogleIcon()}
OPEN
</button>
</div>
</div>`;
});
});
}

function showQR(img,store,platform){
document.getElementById("qrImg").src=img;
document.getElementById("qrOverlay").style.display="flex";
trackEvent("show_qr",store,platform);
}

function closeQR(){document.getElementById("qrOverlay").style.display="none"}

function openLink(url,store,platform){
window.open(url,"_blank");
trackEvent("open_platform",store,platform);
}

/* 🔹 CLIENT-SIDE TRACKING (Google Apps Script ready) */
function trackEvent(event,store,platform){
fetch("https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec",{
method:"POST",
body:JSON.stringify({
event: event,
store: store, 
platform: platform,
page:location.pathname,
ts:new Date().toISOString()
})
}).catch(err=>console.error(err));
}

document.querySelectorAll(".filter-btn").forEach(b=>{
b.onclick=()=>{
b.parentElement.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
b.classList.add("active");
if(b.dataset.store){
currentStore=b.dataset.store;
localStorage.setItem("qrSelectedStore",currentStore);
}
if(b.dataset.platform){
currentPlatform=b.dataset.platform;
localStorage.setItem("qrSelectedPlatform",currentPlatform);
}
render();
};
});

// Load saved selections on page load
const savedStore=localStorage.getItem("qrSelectedStore");
const savedPlatform=localStorage.getItem("qrSelectedPlatform");

if(savedStore){
currentStore=savedStore;
document.querySelectorAll("#storeFilters .filter-btn").forEach(btn=>{
btn.classList.remove("active");
if(btn.dataset.store===savedStore) btn.classList.add("active");
});
}

if(savedPlatform){
currentPlatform=savedPlatform;
document.querySelectorAll("#platformFilters .filter-btn").forEach(btn=>{
btn.classList.remove("active");
if(btn.dataset.platform===savedPlatform) btn.classList.add("active");
});
}

// Personalize back link with staff name
const staffName = localStorage.getItem("staff_name");
if (staffName) {
const backLink = document.getElementById("backLink");
if (backLink) {
backLink.textContent = `← Back to ${staffName}'s Home`;
}

const reviewMessage = document.getElementById("reviewMessage");
if (reviewMessage) {
reviewMessage.textContent = `"${staffName}, it's Review Time! Show the Google QR code to capture your 5-star finish."`;
}
}

render();
</script>
</body>
</html>

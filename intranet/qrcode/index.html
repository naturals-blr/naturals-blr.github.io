const qrTypes = ["facebook","instagram","google"];
let currentStore="all", currentPlatform="all";

function getURL(store,platform){
if(platform==="facebook") return store.Facebook_URL || store.facebook_url;
if(platform==="instagram") return store.Instagram_URL || store.instagram_url;
if(platform==="google") return store.google_review_link;
}

function render(){
const grid=document.getElementById("qrGrid");
grid.innerHTML="";
stores.forEach(store=>{
if(currentStore!=="all" && store.store_id_short!==currentStore) return;
qrTypes.forEach(p=>{
if(currentPlatform!=="all" && p!==currentPlatform) return;
const img=`/images/qrcodes/${store.store_id_short}_${p.charAt(0).toUpperCase()+p.slice(1)}.png`;
grid.innerHTML+=`
<div class="qr-card">
<img src="${img}">
<div class="qr-card-title">${p==="google"?"⭐ Google Review":p.toUpperCase()}</div>
<div class="qr-card-subtitle">${store.store_display_name}</div>
<div class="qr-actions">
<button class="btn btn-show" onclick="showQR('${img}','${store.store_id_short}','${p}')">SHOW QR</button>
<button class="btn btn-${p==='facebook'?'fb':p==='instagram'?'ig':'google'}"
onclick="openLink('${getURL(store,p)}','${store.store_id_short}','${p}')">
OPEN
</button>
</div>
</div>`;
});
});
}

function showQR(img,store,platform){
document.getElementById("qrImg").src=img;
document.getElementById("qrOverlay").style.display="flex";
trackEvent("show_qr",store,platform);
}

function closeQR(){document.getElementById("qrOverlay").style.display="none"}

function openLink(url,store,platform){
window.open(url,"_blank");
trackEvent("open_platform",store,platform);
}

/* 🔹 CLIENT-SIDE TRACKING (Google Apps Script ready) */
function trackEvent(event,store,platform){
fetch("https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec",{
method:"POST",
body:JSON.stringify({
event,event_store:store,platform,
page:location.pathname,
ts:new Date().toISOString()
})
}).catch(()=>{});
}

document.querySelectorAll(".filter-btn").forEach(b=>{
b.onclick=()=>{
b.parentElement.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
if(b.dataset.store){currentStore=b.dataset.store}
if(b.dataset.platform){currentPlatform=b.dataset.platform}
render();
};
});

render();
</script>
